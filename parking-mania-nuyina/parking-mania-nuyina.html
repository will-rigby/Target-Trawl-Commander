        function drawIntroPanel() {
          drawPanel(300);
          var y = canvas.height / 2 - 96;
          ctx.fillStyle = "#FFFFFF";
          drawCenteredText(level.name, y, "40px Impact");
          y += 44;
          var lines = wrapLines(level.brief, "20px Impact", canvas.width - 240);
          for (var i = 0; i < lines.length; i++) {
            drawCenteredText(lines[i], y, "20px Impact");
            y += 26;
          }
          y += 14;
          var w = level.wind, c = level.current;
          drawCenteredText("Wind: " + (w.speed * 1.944).toFixed(0) + " kn from the " + compassName(w.from) +
            (w.gust ? ", gusting" : "") + "    Current: " +
            (c.speed > 0 ? (c.speed * 1.944).toFixed(1) + " kn setting " + compassName(c.to) : "slack"),
            y, "20px Impact");
          drawCenteredText("HIT SPACE TO BEGIN", canvas.height / 2 + 116, "26px Impact");
          drawCredit();
        }

        function drawCrashPanel() {
          drawPanel(200);
          ctx.fillStyle = "#FFFFFF";
          drawCenteredText("HARD CONTACT!", canvas.height / 2 - 40, "52px Impact");
          drawCenteredText("You struck something, Captain. The harbourmaster is not impressed.", canvas.height / 2 + 8, "20px Impact");
          drawCenteredText("HIT SPACE TO RETRY", canvas.height / 2 + 64, "26px Impact");
          drawCredit();
        }

        function drawBerthedPanel() {
          drawPanel(200);
          ctx.fillStyle = "#FFFFFF";
          drawCenteredText("ALL FAST!", canvas.height / 2 - 40, "52px Impact");
          drawCenteredText("Nicely berthed. Lines ashore and gangway down.", canvas.height / 2 + 8, "20px Impact");
          drawCenteredText(levelIndex + 1 < LEVELS.length ? "HIT SPACE FOR THE NEXT LEVEL" : "HIT SPACE",
            canvas.height / 2 + 64, "26px Impact");
          drawCredit();
        }

        function drawCompletePanel() {
          drawPanel(240);
          ctx.fillStyle = "#FFFFFF";
          drawCenteredText("VOYAGE COMPLETE", canvas.height / 2 - 52, "52px Impact");
          drawCenteredText("Refitted at Sembawang and ready for Antarctica.", canvas.height / 2 + 4, "22px Impact");
          drawCenteredText("Well done, Captain.", canvas.height / 2 + 36, "22px Impact");
          drawCenteredText("HIT SPACE FOR THE TITLE SCREEN", canvas.height / 2 + 88, "26px Impact");
          drawCredit();
        }

        /* ================= level flow ================= */
        function startLevel(i) {
          levelIndex = i;
          resetLevel();
        }

        function resetLevel() {
          level = LEVELS[levelIndex];
          terrain = TERRAINS[level.terrain || "hobart"];
          obstacles = OBSTACLES[level.terrain || "hobart"];
          ship.x = level.start.x;
          ship.y = level.start.y;
          ship.heading = level.start.hdg * Math.PI / 180;
          ship.u = 0; ship.v = 0; ship.r = 0;
          ship.throttle = 0; ship.azimuth = 0;
          ship.bowThr = 0; ship.sternThr = 0;
          ship.bowWash = 0; ship.sternWash = 0;
          simTime = 0;
          holdTimer = 0;
          berthConditionsMet = false;
          wake = [];
          wakeCounter = 0;
          collidables = terrain.land.concat(terrain.piers, obstacles);
          initTraffic();
          camX = ship.x;
          camY = ship.y;
          bakeTerrain();  // bake the new shore now rather than hitching on frame one
          scatterWindParticles();
          scatterCurrentParticles();
          gameState = "intro";
        }

        /* ================= main loop ================= */
        function gameLoop() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (gameState == "title") {
            drawTitleScreen();
            return;
          }
          if (gameState == "playing") {
            stepShip();
            stepNpcs();
            if (checkCollision() || checkNpcCollision()) {
              gameState = "crashed";
            } else {
              checkBerth();
            }
          }
          advectWindParticles();
          advectCurrentParticles();
          renderWorld();
          drawHUD();
          if (debugOverlay) drawDebugHUD();
          if (gameState == "intro") drawIntroPanel();
          else if (gameState == "crashed") drawCrashPanel();
          else if (gameState == "berthed") drawBerthedPanel();
          else if (gameState == "complete") drawCompletePanel();
        }

        /* ================= canvas sizing =================
           The canvas fills the browser window (never smaller than the original
           960x640) at the same zoom, so a bigger screen simply sees more of
           the harbour. Every HUD element already lays out from canvas.width/
           height; the terrain bake and the particle fields are rebuilt to the
           new viewport. */
        function fitCanvas() {
          canvas.width = Math.max(960, window.innerWidth);
          canvas.height = Math.max(640, window.innerHeight);
          terrainBox = null;   // view may outgrow the baked rect: re-bake
          scatterWindParticles();
          scatterCurrentParticles();
        }
        window.addEventListener("resize", fitCanvas);
        fitCanvas();

        setInterval(gameLoop, 20);

        /* Diagnostics: open the page as parking-mania-nuyina.html#test to
           auto-drive the ship for a few seconds and print a self-check result
           into the page (also used by headless verification). */
        if (location.hash == "#test") {
          startLevel(0);
          gameState = "playing";
          wPressed = true;
          var testStart = null;
          setTimeout(function() { testStart = { x: ship.x, y: ship.y }; }, 500);
          setTimeout(function() {
            var moved = testStart ? distance(testStart.x, testStart.y, ship.x, ship.y) : -1;
            var result = { moved: Math.round(moved * 100) / 100,
                           u: Math.round(ship.u * 100) / 100 };
            /* alongside Macquarie 2 in open water: no collision expected */
            ship.heading = 351.6 * Math.PI / 180;
            ship.u = 0; ship.v = 0; ship.r = 0;
            ship.x = 3900; ship.y = 5170;
            result.hitClear = checkCollision();
            /* hull overlapping the quay face: edge intersection expected */
            ship.x = 3785;
            result.hitQuayEdge = checkCollision();
            /* fully inside the wharf: containment check expected */
            ship.x = 3760;
            result.hitQuayInside = checkCollision();
            /* centered in the berth, aligned and stopped: conditions met */
            ship.x = level.berth.cx; ship.y = level.berth.cy;
            checkBerth();
            result.berthOK = berthConditionsMet;
            result.buildings = (HOBART_TERRAIN.buildings || []).length;
            result.roads = (HOBART_TERRAIN.roads || []).length;
            result.vegetation = (HOBART_TERRAIN.vegetation || []).length;
            result.pass = result.moved > 0.1 && result.u > 0.05 && !result.hitClear &&
              result.hitQuayEdge && result.hitQuayInside && result.berthOK &&
              result.buildings > 0 && result.roads > 0;
            var div = document.createElement("div");
            div.id = "test-result";
            div.textContent = JSON.stringify(result);
            document.body.appendChild(div);
          }, 3000);
        }

        /* Dev aid: open as #play3 / #play9 etc to jump straight into a level
           (used for headless screenshots; harmless in normal play). */
        var playHash = /^#play([1-9])$/.exec(location.hash);
        if (playHash && parseInt(playHash[1], 10) <= LEVELS.length) {
          startLevel(parseInt(playHash[1], 10) - 1);
          gameState = "playing";
        }

        /* Singapore self-check: parking-mania-nuyina.html#test-sg drives off
           the Changi start, then verifies traffic (a route vessel underway, a
           small boat that flees the player) and the terrain (open water vs
           Punggol shore, and the carved graving dock accepting the ship). */
        if (location.hash == "#test-sg") {
          startLevel(6);
          gameState = "playing";
          wPressed = true;
          var sgT0 = null, sgMoved = -1, sgU = -1;
          var vIdx = -1, vPos = null, bIdx = -1, mIdx = -1, mPos = null;
          setTimeout(function() { sgT0 = { x: ship.x, y: ship.y }; }, 500);
          setTimeout(function() {
            sgMoved = sgT0 ? distance(sgT0.x, sgT0.y, ship.x, ship.y) : -1;
            sgU = ship.u;
            for (var i = 0; i < npcs.length; i++) {
              if (npcs[i].path && vIdx < 0) vIdx = i;
              if (npcs[i].kind === "launch" && bIdx < 0) bIdx = i;
              if (npcs[i].moored && mIdx < 0) mIdx = i;
            }
            if (vIdx >= 0) vPos = { x: npcs[vIdx].x, y: npcs[vIdx].y };
            if (mIdx >= 0) mPos = { x: npcs[mIdx].x, y: npcs[mIdx].y };
            /* park in open water east of the anchorage (NOT in the berth
               zone, which would end the level and freeze the traffic) and
               drop a boat alongside: it should clear off within seconds */
            wPressed = false;
            var anch = sgPt([1.4295, 103.9100]);
            ship.x = anch[0]; ship.y = anch[1];
            ship.u = 0; ship.v = 0; ship.r = 0; ship.throttle = 0;
            if (bIdx >= 0) { npcs[bIdx].x = ship.x + 60; npcs[bIdx].y = ship.y; }
          }, 3000);
          setTimeout(function() {
            var result = { moved: Math.round(sgMoved * 100) / 100,
                           u: Math.round(sgU * 100) / 100,
                           npcs: npcs.length };
            result.vesselMoved = vIdx >= 0 && vPos ?
              Math.round(distance(vPos.x, vPos.y, npcs[vIdx].x, npcs[vIdx].y)) : -1;
            result.boatFled = bIdx >= 0 ?
              Math.round(distance(ship.x, ship.y, npcs[bIdx].x, npcs[bIdx].y) - 60) : -1;
            result.mooredStill = mIdx >= 0 && mPos ?
              distance(mPos.x, mPos.y, npcs[mIdx].x, npcs[mIdx].y) < 1 : false;
            /* teleport checks against the Singapore map */
            var clearPt = sgPt([1.3600, 104.0430]);
            ship.heading = 305 * Math.PI / 180;
            ship.u = 0; ship.v = 0; ship.r = 0;
            ship.x = clearPt[0]; ship.y = clearPt[1];
            result.hitClear = checkCollision();
            var punggol = sgPt([1.3980, 103.9080]);
            ship.x = punggol[0]; ship.y = punggol[1];
            result.hitPunggol = checkCollision();
            /* the level-9 wharf start must be clear water off the quay */
            startLevel(8);
            result.hitWharfStart = checkCollision() || checkNpcCollision();
            /* the carve regression: sit her in the graving dock */
            ship.heading = level.berth.hdg * Math.PI / 180;
            ship.u = 0; ship.v = 0; ship.r = 0;
            ship.x = level.berth.cx; ship.y = level.berth.cy;
            result.hitDock = checkCollision();
            checkBerth();
            result.dockBerthOK = berthConditionsMet;
            result.land = SINGAPORE_TERRAIN.land.length;
            result.buildings = (SINGAPORE_TERRAIN.buildings || []).length;
            result.roads = (SINGAPORE_TERRAIN.roads || []).length;
            /* frame-budget sanity on the big map (ms per call) */
            var tc = performance.now();
            for (var pi = 0; pi < 50; pi++) { checkCollision(); checkNpcCollision(); }
            result.collideMs = Math.round((performance.now() - tc) * 2) / 100;
            tc = performance.now();
            bakeTerrain();
            result.bakeMs = Math.round((performance.now() - tc) * 100) / 100;
            result.pass = result.moved > 0.1 && result.u > 0.05 &&
              result.npcs >= 15 && result.vesselMoved > 20 && result.boatFled > 10 &&
              result.mooredStill && !result.hitWharfStart &&
              !result.hitClear && result.hitPunggol && !result.hitDock &&
              result.dockBerthOK && result.land > 0 && result.buildings > 0 &&
              result.roads > 0;
            var div = document.createElement("div");
            div.id = "test-result";
            div.textContent = JSON.stringify(result);
            document.body.appendChild(div);
          }, 7000);
        }
    </script>
</body>

</html>
